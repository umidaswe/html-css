<!DOCTYPE html>
  <html>
    <head></head>
    <body>
         <style>
          .box{
                display: grid;
                grid-template-columns: 200px 75px;
            }
        </style>
        <div class="box">
          <div style="background-color: lightblue;">200px</div>
          <div style="background-color: lightpink;">75px</div>
        </div>
      
        <br> <br>
      
        <div class="box2">
              <style>
          .box2{
                 display: grid;
                grid-template-columns: 50px 1fr 75px;
            }
        </style>
            <div style="background-color: lightblue;">col 1</div>
            <div style="background-color: lightpink;">col 2</div>
            <div style="background-color: lightgreen;">col 3</div>
        </style>
           <!--1shi tapsirma-->
           <style>
            .grid{
                display: grid;
                grid-template-columns: 1fr 2fr;
            }
        </style>
        <div class="grid">
            <div style="background-color: aquamarine;">1fr</div>
            <div style="background-color: rgb(209, 27, 27);">2fr</div>  
        </div>

           <!--2shi tapsirma-->
          <style>
            .columns{
                   display: grid;
                grid-template-columns: 250px 1fr;
            }
        </style>
        <div class="columns">
            <div style="background-color: aquamarine;">250px</div>
            <div style="background-color: blueviolet;">1fr</div>
        </div>
          
     <!--3shi tapsirma-->
             <style>
            .color{
                display: grid;
                grid-template-columns:repeat(3, 200px);
            }
          </style>
        <div class="color">
            <div style="background-color: blueviolet;">200px</div>
            <div style="background-color: aquamarine;">200px</div>
            <div style="background-color: rgb(209, 27, 27);">200px</div>
        </div>
          
      <!--4shi tapsirma-->
          <style>
            .box{
                display: grid;
                grid-template-columns:1fr 3fr 1fr;
            }
          
        </style>
        <div class="box">
            <div style="background-color: blueviolet;">box 1</div>
            <div style="background-color: aquamarine;">box 2</div>
            <div style="background-color: rgb(209, 27, 27);">box 3</div>
        </div>

             <!--5shi tapsirma-->
           <style>
            .box{
                display: grid;
                grid-template-columns:1fr 1fr 1fr 1fr;
                gap: 10px 20px;
            }
          
        </style>
        <div class="box">
            <div style="background-color: lightpink;">col 1</div>
            <div style="background-color: lightpink;">col 2</div>
            <div style="background-color: lightpink;">col 3</div>
            <div style="background-color: lightpink;">col 4</div>
            <div style="background-color: lightpink;">col 5</div>
            <div style="background-color: lightpink;">col 6</div>
            <div style="background-color: lightpink;">col 7</div>
            <div style="background-color: lightpink;">col 8</div>
        </div>
    </body>
  </html>
